  - generic:
    - generic:
      - generic: Principles
      - heading [level=2]: 四条设计原则
      - generic:
        - article:
          - heading [level=3]: 组织层定义底线，不定义技术栈细节
          - paragraph: 保持通用约束，不把 Java、Vue、MyBatis 等实现细节塞进组织层。
        - article:
          - heading [level=3]: 技术栈层可以更严格，但不能更宽松
          - paragraph: 技术栈层负责把底线进一步具体化，但不得突破组织约束。
        - article:
          - heading [level=3]: 每条规则必须可被 AI 在特定环节执行
          - paragraph: 规则不是口号，必须能在生成、评审、发布等环节被落实。
        - article:
          - heading [level=3]: 无法执行的规则不进入正式约束
          - paragraph: 确保规则具备落地性，避免只有形式没有执行抓手。
