      - generic: Why
      - heading [level=2]: 为什么需要组织级规范
      - generic:
        - paragraph: AI 编码能力快速增强，但行为边界、输出稳定性和交付标准并不会自动统一。
        - generic:
          - article:
            - strong: 规则口径不一致
            - text: 团队之间标准漂移，导致交付质量波动
          - article:
            - strong: 安全底线难统一
            - text: 没有统一红线就会把风险下放到项目现场
          - article:
            - strong: 流程容易被跳过
            - text: 直接写代码会让规格、设计和验证缺位
          - article:
            - strong: 治理不可审计
            - text: 没有统一规范就难形成可检查、可追责的闭环
