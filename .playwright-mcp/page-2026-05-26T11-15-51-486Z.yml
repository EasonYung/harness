  - generic:
    - generic:
      - generic: Core Lines
      - heading [level=2]: 三条核心约束主线
      - generic:
        - article:
          - generic: AI 行为
          - heading [level=3]: AI 编码行为底线
          - list:
            - listitem: 编码前必须思考，不假设、不隐藏困惑
            - listitem: 用最少的代码解决问题，不过度推测
            - listitem: 只碰必须碰的代码，匹配现有风格
            - listitem: 定义成功标准，测试先行，循环验证
        - article:
          - generic: 安全
          - heading [level=3]: 安全红线
          - list:
            - listitem: 禁止硬编码密钥、密码、token
            - listitem: 禁止 SQL 拼接，必须参数化查询
            - listitem: 禁止明文存储密码，必须加盐哈希
            - listitem: 禁止 eval、反序列化注入等危险操作
        - article:
          - generic: 质量
          - heading [level=3]: 代码质量规范
          - list:
            - listitem: 所有错误必须明确上报，不得静默吞掉
            - listitem: 测试覆盖正常路径和异常路径
            - listitem: 代码审查不得走过场
            - listitem: 禁止占位实现、过度注释等 No-Go 反模式
    - generic:
      - generic: 核心底线
      - generic: "05"
