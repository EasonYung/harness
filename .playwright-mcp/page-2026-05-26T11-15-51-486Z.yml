      - generic:
        - generic:
          - strong: proposal
          - text: 明确为什么做、做什么
        - generic:
          - strong: specs
          - text: 定义行为、输入输出、异常与测试场景
        - generic:
          - strong: design
          - text: 说明如何实现、影响范围与关键决策
        - generic:
          - strong: tasks
          - text: 拆解执行步骤、依赖与验证要求
        - generic:
          - strong: implementation
          - text: 只有在 gate 满足后才进入编码
      - generic: 主线：proposal → specs → design → tasks → implementation
      - generic:
        - paragraph: 每个阶段有 gate（准入条件）和 owner（负责人），不是直接写代码，而是先把目标、规格、设计和任务拆解清楚。
