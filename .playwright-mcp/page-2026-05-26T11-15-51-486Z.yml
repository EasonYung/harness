  - generic:
    - generic:
      - generic: Governance
      - heading [level=2]: 冲突与豁免机制
      - generic:
        - article:
          - heading [level=3]: 默认冲突策略
          - paragraph:
            - strong: stricter wins
            - text: ：更严格者优先；数值取更大、范围取更窄、严重级别取更高。
        - article:
          - heading [level=3]: 不可豁免范围
          - paragraph:
            - strong: SEC-* 和 NG-* 不可豁免
            - text: ，安全红线和 No-Go 反模式是组织底线。
        - article:
          - heading [level=3]: 可审批豁免
          - paragraph: AI-*、PL-*、CQ-*、ORG-* 可申请，但需要说明风险、截止时间与补救计划。
        - article:
          - heading [level=3]: AI 的裁定边界
          - paragraph: 遇到无法自动判断的定性冲突，AI 必须停下来询问人工，不得自行拍板。
